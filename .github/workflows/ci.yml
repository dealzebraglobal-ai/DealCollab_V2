name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo-checks:
    name: Install and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Safe dummy values for CI.
      # Do not put real Supabase/OpenAI/Groq/Google secrets here.
      # Real secrets should go in GitHub Settings → Secrets and variables → Actions.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      NEXTAUTH_SECRET: ci-placeholder-nextauth-secret-at-least-32-characters
      AUTH_SECRET: ci-placeholder-nextauth-secret-at-least-32-characters
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-placeholder-google-client-id
      GOOGLE_CLIENT_SECRET: ci-placeholder-google-client-secret
      GROQ_API_KEY: ci-placeholder-groq-api-key
      OPENAI_API_KEY: ci-placeholder-openai-api-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dealcollab_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit
